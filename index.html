<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>No Second Mistake</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./config.public.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <p class="eyebrow">Personal Operating System</p>
          <h1 class="brand-title">
            <span class="principle-mark" lang="zh-Hans">不贰过</span>
            <span>No Second Mistake</span>
          </h1>
          <p class="brand-copy">Turn each mistake into a better system.</p>
        </div>

        <div class="top-actions" aria-label="Daily navigation">
          <button class="icon-button" id="previousDay" type="button" aria-label="Previous day">&lt;</button>
          <input id="datePicker" class="date-input" type="date" aria-label="Selected date">
          <button class="icon-button" id="nextDay" type="button" aria-label="Next day">&gt;</button>
          <button class="text-button" id="todayButton" type="button">Today</button>
          <span class="save-status" id="saveStatus" role="status" aria-live="polite">Loading...</span>
        </div>
      </header>

      <main class="journal-shell">
        <section class="journal-panel card-stack-panel" id="journalPanel" aria-labelledby="dailyLoopTitle" data-motion="idle" data-spread="false">
          <div class="card-stack-layer layer-two" aria-hidden="true"></div>
          <div class="card-stack-layer layer-one" aria-hidden="true"></div>
          <span class="loop-card-badge" id="loopCardBadge" aria-label="Current card number">1</span>

          <div class="section-title loop-card-header">
            <div>
              <p class="eyebrow" id="selectedDateLabel">Today</p>
              <h2 id="dailyLoopTitle">Daily Loop</h2>
            </div>
            <div class="loop-card-controls" aria-label="Daily loop pages">
              <button class="mini-icon-button" id="previousLoopPage" type="button" aria-label="Previous loop page">&lt;</button>
              <span class="loop-card-meta" id="loopCardMeta">1 / 1</span>
              <button class="mini-icon-button" id="nextLoopPage" type="button" aria-label="Next loop page">&gt;</button>
              <button class="text-button add-card-button" id="addLoopPage" type="button">Add page</button>
              <button class="text-button spread-card-button" id="toggleLoopSpread" type="button">Spread</button>
              <button class="text-button delete-card-button" id="deleteLoopPage" type="button">Delete</button>
            </div>
          </div>

          <div class="loop-spread-tray" id="loopSpreadTray" hidden>
            <div class="loop-spread-list" id="loopSpreadList" aria-label="Daily loop card overview"></div>
          </div>

          <div class="field-grid">
            <label class="journal-field large-field">
              <span>Signal / Mistake</span>
              <textarea id="signalInput" rows="5" placeholder="What happened? Name the event without self-blame."></textarea>
            </label>

            <label class="journal-field large-field">
              <span>Root Condition</span>
              <textarea id="rootConditionInput" rows="5" placeholder="What conditions made this likely to happen again?"></textarea>
            </label>

            <label class="journal-field">
              <span>Principle</span>
              <textarea id="principleInput" rows="4" placeholder="What reusable rule should guide the next similar situation?"></textarea>
            </label>

            <label class="journal-field">
              <span>Mechanism / Next Move</span>
              <textarea id="mechanismInput" rows="4" placeholder="What system, default, or concrete next action prevents a repeat?"></textarea>
            </label>
          </div>
        </section>

        <section class="ai-panel" aria-labelledby="aiPanelTitle">
          <div class="section-title compact-title ai-title-row">
            <div>
              <p class="eyebrow">AI Dynamics</p>
              <h2 id="aiPanelTitle">Use AI as a working model of the system.</h2>
            </div>
            <div class="ai-config-fields">
              <label class="model-field">
                <span>Model</span>
                <input id="aiModelInput" list="aiModelOptions" autocomplete="off" value="gpt-5.2">
                <datalist id="aiModelOptions">
                  <option value="gpt-5.5"></option>
                  <option value="gpt-5.2"></option>
                  <option value="gpt-5.1"></option>
                </datalist>
              </label>
              <label class="model-field effort-field">
                <span>Reasoning</span>
                <select id="aiEffortSelect">
                  <option value="low">Low</option>
                  <option value="medium">Medium</option>
                  <option value="high" selected>High</option>
                </select>
              </label>
            </div>
          </div>

          <div class="ai-actions">
            <button class="text-button ai-primary-button" id="analyzeButton" type="button">Analyze with AI</button>
            <button class="text-button" id="saveAnalysisButton" type="button">Save Analysis</button>
            <span class="ai-status" id="aiStatus" role="status" aria-live="polite">AI ready</span>
          </div>

          <label class="ai-draft-field">
            <span>Analysis Draft</span>
            <textarea id="aiOutput" rows="10" placeholder="Complete the daily loop, ask AI to model the dynamics, or paste analysis from another model here."></textarea>
          </label>

          <div class="chat-row">
            <textarea id="aiChatInput" rows="3" placeholder="Ask a follow-up about the dynamics, intervention, or next experiment."></textarea>
            <button class="text-button" id="aiChatButton" type="button">Ask</button>
          </div>

          <div class="saved-analyses">
            <p class="eyebrow">Saved Analyses</p>
            <div id="analysisList" class="analysis-list"></div>
          </div>
        </section>

        <section class="anchors-panel" aria-labelledby="anchorsTitle">
          <div class="section-title compact-title">
            <p class="eyebrow">Ambition Anchors</p>
            <h2 id="anchorsTitle">Today still points somewhere.</h2>
          </div>

          <div class="anchor-grid">
            <label class="anchor-card venture">
              <span>Entrepreneur</span>
              <textarea id="ventureActionInput" rows="3" placeholder="One reality-facing move."></textarea>
            </label>
            <label class="anchor-card research">
              <span>RL Research</span>
              <textarea id="researchActionInput" rows="3" placeholder="One compounding research artifact."></textarea>
            </label>
            <label class="anchor-card family">
              <span>Family</span>
              <textarea id="familyActionInput" rows="3" placeholder="One act of presence or companionship."></textarea>
            </label>
          </div>
        </section>
      </main>

      <button class="manual-save-island" id="manualSaveIsland" type="button" aria-label="Save everything now">
        <span class="island-dot" id="manualSaveDot" aria-hidden="true"></span>
        <span class="island-icon" aria-hidden="true">Save</span>
        <span class="island-label" id="manualSaveLabel">Saved</span>
      </button>

      <div class="analysis-modal" id="analysisModal" hidden>
        <button class="analysis-modal-backdrop" type="button" data-close-analysis aria-label="Close analysis reader"></button>
        <article class="analysis-reader" role="dialog" aria-modal="true" aria-labelledby="analysisModalTitle">
          <header class="analysis-reader-header">
            <div>
              <p class="eyebrow" id="analysisModalMeta">Saved analysis</p>
              <h2 id="analysisModalTitle">Analysis Reader</h2>
            </div>
            <button class="icon-button reader-close-button" type="button" data-close-analysis aria-label="Close analysis reader">x</button>
          </header>
          <div class="analysis-reader-body" id="analysisModalBody"></div>
        </article>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
